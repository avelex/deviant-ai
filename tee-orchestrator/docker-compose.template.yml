version: '3.8'
services:
  referee:
    build: ./referee
    environment:
      - AGENT1_URL=http://agent1:8080/move
      - AGENT2_URL=http://agent2:8080/move
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
    depends_on:
      agent1:
        condition: service_started
      agent2:
        condition: service_started

  agent1:
    build: ./agent-base
    environment:
      - SCRIPT_HASH=${AGENT1_HASH}
    volumes:
      - agent1_data:/data
      - /var/run/dstack.sock:/var/run/dstack.sock

  agent2:
    build: ./agent-base
    environment:
      - SCRIPT_HASH=${AGENT2_HASH}
    volumes:
      - agent2_data:/data
      - /var/run/dstack.sock:/var/run/dstack.sock

volumes:
  agent1_data:
  agent2_data:
