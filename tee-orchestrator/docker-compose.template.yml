version: '3.8'
services:
  downloader:
    build: ./downloader
    environment:
      - AGENT1_HASH=${AGENT1_HASH}
      - AGENT2_HASH=${AGENT2_HASH}
    volumes:
      - shared_data:/shared

  referee:
    build: ./referee
    environment:
      - AGENT1_URL=http://agent1:8080/move
      - AGENT2_URL=http://agent2:8080/move
    volumes:
      - shared_data:/shared
      - agent1_data:/shared_agent1
      - agent2_data:/shared_agent2
      - /var/run/dstack.sock:/var/run/dstack.sock
    depends_on:
      downloader:
        condition: service_completed_successfully
      agent1:
        condition: service_started
      agent2:
        condition: service_started

  agent1:
    build: ./agent-base
    volumes:
      - agent1_data:/shared:ro
      - /var/run/dstack.sock:/var/run/dstack.sock

  agent2:
    build: ./agent-base
    volumes:
      - agent2_data:/shared:ro
      - /var/run/dstack.sock:/var/run/dstack.sock

volumes:
  shared_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  agent1_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  agent2_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
